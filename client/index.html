<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dark Maze</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      color: #fff;
      font-family: 'Segoe UI', system-ui, sans-serif;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
    }

    /* Header */
    #user-header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      display: flex;
      align-items: center;
      padding: 0.5rem 1rem;
      background: rgba(26, 26, 46, 0.85);
      border-bottom: 1px solid #374151;
      font-size: 0.85rem;
      color: #9ca3af;
      z-index: 100;
    }

    #header-username {
      color: #f59e0b;
      font-weight: 600;
    }

    #user-header::before {
      content: "👤 ";
    }

    #app {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100vw;
      height: 100vh;
    }

    #game-canvas {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
    }

    /* Username screen */
    #username-screen {
      text-align: center;
    }

    #username-screen h1 {
      font-size: 3rem;
      margin-bottom: 2rem;
    }

    #username-form {
      display: flex;
      gap: 0.5rem;
      justify-content: center;
    }

    /* Lobby */
    #lobby {
      text-align: center;
    }

    #lobby h1 {
      font-size: 3rem;
      margin-bottom: 2rem;
    }

    #join-form, #change-name-form, #username-form {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
      justify-content: center;
    }

    #name-input {
      padding: 0.75rem 1rem;
      font-size: 1rem;
      border: 2px solid #374151;
      border-radius: 8px;
      background: #1a1a2e;
      color: #fff;
      outline: none;
      width: 220px;
    }

    #name-input:focus {
      border-color: #f59e0b;
    }

    #join-btn, #change-name-btn, #start-btn, #lobby-btn {
      padding: 0.75rem 1.5rem;
      font-size: 1rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: transform 0.1s;
    }

    #join-btn, #change-name-btn, #lobby-btn {
      background: #3498db;
      color: #fff;
    }

    #start-btn {
      background: #f59e0b;
      color: #000;
      font-size: 1.25rem;
      padding: 1rem 2.5rem;
      margin-top: 1rem;
    }

    #join-btn:hover, #change-name-btn:hover, #start-btn:hover, #lobby-btn:hover {
      transform: scale(1.05);
    }

    #player-list {
      margin: 1rem 0;
    }

    .player-entry {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.4rem 0;
      font-size: 1.1rem;
      justify-content: center;
    }

    .player-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      display: inline-block;
    }

    /* Game Over */
    #game-over {
      text-align: center;
    }

    #game-over h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
    }

    #winner-name {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 1.5rem;
    }

    #minimap {
      border: 2px solid #374151;
      border-radius: 8px;
      margin-bottom: 1.5rem;
      display: block;
      margin-left: auto;
      margin-right: auto;
    }

    #stats-table {
      margin: 0 auto 1.5rem;
      border-collapse: collapse;
      min-width: 320px;
    }

    #stats-table th,
    #stats-table td {
      padding: 0.5rem 1rem;
      border-bottom: 1px solid #374151;
      text-align: center;
    }

    #stats-table th {
      color: #9ca3af;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    #stats-table .winner-row {
      background: rgba(245, 158, 11, 0.15);
    }

    .game-toast {
      position: fixed;
      top: 40px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(220, 38, 38, 0.9);
      color: #fff;
      padding: 0.6rem 1.2rem;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      z-index: 200;
      animation: toast-fade 4s ease forwards;
      pointer-events: none;
    }

    @keyframes toast-fade {
      0% { opacity: 0; transform: translateX(-50%) translateY(-10px); }
      10% { opacity: 1; transform: translateX(-50%) translateY(0); }
      80% { opacity: 1; }
      100% { opacity: 0; }
    }
  </style>
</head>
<body>
  <div id="user-header" style="display:none">
    <span id="header-username"></span>
  </div>
  <div id="app"></div>
  <canvas id="game-canvas"></canvas>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
